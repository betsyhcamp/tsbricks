data:
  freq: "MS"

cross_validation:
  mode: explicit
  horizon: 6
  forecast_origins:
    - "2023-01-01"
    - "2023-06-01"

transforms:
  - name: box_cox
    class: tsbricks.blocks.transforms.BoxCoxTransform
    scope: per_series
    targets: [y]
    perform_inverse_transform: true
    params:
      method: guerrero
      season_length: 12

model:
  callable: __main__.statsforecast_ets
  hyperparameters:
    season_length: 12
    freq: "MS"

metrics:
  definitions:
    - name: rmse
      callable: tsbricks.blocks.metrics.rmse
      type: simple
    - name: rmsse
      callable: tsbricks.blocks.metrics.rmsse
      type: context_aware

# Optional: test fold for held-out evaluation after cross-validation.
# When present, the model is re-trained from scratch on ds <= test_origin
# and evaluated over the next cross_validation.horizon periods.
# Remove this block (or set to null) to skip the test fold.
test:
  test_origin: "2024-01-01"
  # horizon inherited from cross_validation.horizon
