name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
        deps: ["latest", "min"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: uv sync

      - name: Install minimum dependency versions
        if: matrix.deps == 'min'
        run: uv pip install --overrides min-overrides.txt -e .

      - name: Run pre-commit (file utilities + lint + format-check)
        run: task pre-commit

      - name: Run tests
        run: task test

      - name: Build documentation
        run: task docs

      - name: Build package
        run: task build
